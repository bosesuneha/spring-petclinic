apiVersion: v1
kind: Service
metadata:
  name: spring-petclinic
  namespace: default
  labels:
    app: spring-petclinic
    app.kubernetes.io/name: spring-petclinic
    app.kubernetes.io/component: application
spec:
  type: ClusterIP
  selector:
    app: spring-petclinic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP